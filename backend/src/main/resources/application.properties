spring.application.name=smart-erp

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=${DB_SSL:disable}
spring.datasource.hikari.data-source-properties.sslrootcert=${DB_CERT_PATH}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

smarterp.auth.jwt.secret=${AUTH_JWT_SECRET}
smarterp.cors.allowed_origins=${CORS_ALLOWED_ORIGINS:http://localhost:*}